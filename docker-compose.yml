services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: sqlite:////app/data/agenticos.db
      SKILL_STORAGE_DIR: /app/data/skills
    volumes:
      - ./data:/app/data
    ports:
      - "8001:8001"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ""
    depends_on:
      - backend
    ports:
      - "3001:80"
    restart: unless-stopped
